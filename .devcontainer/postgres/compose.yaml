services:
  app:
    image: mcr.microsoft.com/devcontainers/ruby:4
    command: sleep infinity
    volumes:
      - ../..:/home/vscode/app:cached
    environment:
      POSTGRES_DATABASE_URL: postgresql://rails_dojo:RailsDojo2026Db@db:5432/rails_dojo_production
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: rails_dojo_production
      POSTGRES_USER: rails_dojo
      POSTGRES_PASSWORD: RailsDojo2026Db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rails_dojo -d rails_dojo_production"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
